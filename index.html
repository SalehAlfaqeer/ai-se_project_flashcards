<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Saleh Alfaqeer" />
    <meta name="description" content="here's the description of the page" />
    <meta
      name="keywords"
      content="flashcards, study, learning, education, coding, tech, software, AI"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playwrite+NO:wght@100..400&family=Playwrite+NZ+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/vendor/normalize.css" />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <title>Flip cards project</title>
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#deck-view" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li class="nav__link"><a href="#deck-view">My Decks</a></li>
          <li class="nav__link"><a href="#about">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content">
      <section id="deck-view" class="gallery">
        <h2 class="gallery__title">My Decks</h2>
        <ul class="gallery__list">
          <template id="deck-template">
            <li class="card card_color_green">
              <a class="card__link" href="#" aria-label=""></a>
              <h3 class="card__title"></h3>
              <div class="card__row">
                <p class="card__count"></p>
                <button
                  class="card__delete-btn"
                  type="button"
                  aria-label="Delete deck"
                ></button>
              </div>
            </li>
          </template>

          <li>
            <button
              aria-label="Add a new deck"
              type="button"
              class="gallery__new-card-btn"
            >
              + New Deck
            </button>
          </li>
        </ul>
      </section>

      <section id="card-view" class="gallery" hidden>
        <div class="gallery__header">
          <h2 class="gallery__title"></h2>
          <a class="gallery__practice-btn" href="#">Practice</a>
        </div>
        <ul class="gallery__list">
          <template id="card-template">
            <li class="card card_color_green">
              <h3 class="card__title"></h3>
              <div class="card__row">
                <button
                  class="card__flip-btn"
                  type="button"
                  aria-label="Flip card"
                ></button>
                <button
                  class="card__delete-btn"
                  type="button"
                  aria-label="Delete card"
                ></button>
              </div>
            </li>
          </template>

          <li>
            <button
              aria-label="Add a new card"
              type="button"
              class="gallery__new-card-btn gallery__new-card-btn_location_deck-view"
            >
              + New Card
            </button>
          </li>
        </ul>
      </section>

      <section id="carousel" class="carousel" hidden>
        <h2 class="carousel__title">Carousel</h2>
        <div class="carousel__grid">
          <button
            type="button"
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            aria-label="Go to previous card"
          ></button>
          <div class="carousel__card carousel__card_color_green">
            <p class="carousel__card-text">Card text</p>
          </div>
          <button
            type="button"
            class="carousel__btn carousel__btn_type_right"
            aria-label="Go to next card"
          ></button>
          <button
            type="button"
            class="carousel__btn carousel__btn_type_flip"
            aria-label="Flip the card"
          ></button>
        </div>
      </section>

      <section id="new-deck" class="new-deck" hidden>
        <h2 class="new-deck__title">New Deck</h2>
        <form class="new-deck__form">
          <fieldset class="new-deck__color-picker">
            <legend class="new-deck__legend">Pick the deck color</legend>
            <label class="new-deck__color-label" for="green">
              <input
                class="new-deck__color-input new-deck__color-input_color_green"
                aria-label="Green"
                name="color"
                id="green"
                value="#64D583"
                type="radio"
                checked
              />
            </label>

            <label class="new-deck__color-label" for="blue">
              <input
                class="new-deck__color-input new-deck__color-input_color_blue"
                aria-label="Blue"
                name="color"
                id="blue"
                value="#91A8F9"
                type="radio"
              />
            </label>

            <label class="new-deck__color-label" for="purple">
              <input
                class="new-deck__color-input new-deck__color-input_color_purple"
                aria-label="Purple"
                name="color"
                id="purple"
                value="#AA8EF0"
                type="radio"
              />
            </label>

            <label class="new-deck__color-label" for="pink">
              <input
                class="new-deck__color-input new-deck__color-input_color_pink"
                aria-label="Pink"
                name="color"
                id="pink"
                value="#EE92D7"
                type="radio"
              />
            </label>

            <label class="new-deck__color-label" for="orange">
              <input
                class="new-deck__color-input new-deck__color-input_color_orange"
                aria-label="Orange"
                name="color"
                id="orange"
                value="#EE955E"
                type="radio"
              />
            </label>

            <label class="new-deck__color-label" for="yellow">
              <input
                class="new-deck__color-input new-deck__color-input_color_yellow"
                aria-label="Yellow"
                name="color"
                id="yellow"
                value="#F5D770"
                type="radio"
              />
            </label>
          </fieldset>

          <label class="new-deck__input-label" for="deck-name-input"
            >Write the JSON array of cards so that it matches this schema
            <textarea
              class="new-deck__textarea"
              id="deck-name-input"
              name="deck-name-input"
              rows="10"
              placeholder='{
                "name": "Deck Name", 
                "cards": [ 
                { 
                  "question": "Question?", "answer": "Answer" 
                }, 
                ... 
                ] 
              }'
            ></textarea>
          </label>

          <button class="new-deck__submit-btn" type="submit" disabled>
            Create the Deck
          </button>
        </form>
      </section>

      <section id="not-found" class="not-found" hidden>
        <h2 class="not-found__title">404 Not Found</h2>
        <p class="not-found__text">
          The page you were looking for does not exist.
        </p>
        <a class="not-found__link" href="#deck-view">Go back home</a>
      </section>
    </main>
    <div class="modal" id="error-modal">
      <div class="modal__container">
        <h2 class="modal__title">An error has occurred</h2>
        <p class="modal__error"></p>
        <button class="modal__close-btn" type="button">Dismiss</button>
      </div>
    </div>
    <footer class="footer">
      <div class="footer__content">
        <p class="footer__text">&copy; 2026 Saleh Alfa</p>
        <p>
          <a href="https://jigsaw.w3.org/css-validator/check/referer">
            <img
              style="border: 0; width: 88px; height: 31px"
              src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
              alt="Valid CSS!"
            />
          </a>
        </p>
      </div>
    </footer>
    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
