<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Saleh Alfaqeer" />
    <meta name="description" content="here's the description of the page" />
    <meta
      name="keywords"
      content="flashcards, study, learning, education, coding, tech, software, AI"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playwrite+NO:wght@100..400&family=Playwrite+NZ+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/vendor/normalize.css" />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <title>Flip cards project</title>
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li class="nav__link"><a href="#home">My Decks</a></li>
          <li class="nav__link"><a href="#about">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content">
      <section id="home" class="decks">
        <h2 class="decks__title">My Decks</h2>
        <ul class="decks__list">
          <template id="deck-template">
            <li class="deck deck_color_green">
              <a class="deck__link" href="#"></a>
              <h3 class="deck__title"></h3>
              <div class="deck__row">
                <p class="deck__count"></p>
                <button class="deck__delete-btn" type="button"></button>
              </div>
            </li>
          </template>

          <li>
            <button
              aria-label="Add a new deck"
              type="button"
              class="decks__new-deck-btn"
            >
              + New Deck
            </button>
          </li>
        </ul>
      </section>

      <section id="carousel" class="carousel" hidden>
        <h2 class="carousel__title">Carousel</h2>
        <div class="carousel__row">
          <button
            type="button"
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            aria-label="Go to previous card"
          ></button>
          <div class="carousel__card card card__carousel_color_green">
            <p class="carousel__card-text">Card text</p>
          </div>
          <button
            type="button"
            class="carousel__btn carousel__btn_type_right"
            aria-label="Go to next card"
          ></button>
        </div>
        <button
          type="button"
          class="carousel__btn carousel__btn_type_flip"
          aria-label="Flip the card"
        ></button>
      </section>

      <section id="not-found" class="not-found" hidden>
        <h2 class="not-found__title">404 Not Found</h2>
        <p class="not-found__text">
          The page you were looking for does not exist.
        </p>
        <a class="not-found__link" href="#home">Go back home</a>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Saleh Alfa</p>
      <p>
        <a href="https://jigsaw.w3.org/css-validator/check/referer">
          <img
            style="border: 0; width: 88px; height: 31px"
            src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
            alt="Valid CSS!"
          />
        </a>
      </p>
    </footer>
    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
